name: Deploy to GitHub Pages

# Publishes the static app to GitHub Pages.
# Runs when main updates, or manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on via the API on first run,
        # so no manual Settings toggle is needed.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble clean site
        # Copy only the static site into _site, excluding the source PDFs
        # (which contain a staff phone number), git data and CI config.
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='*.pdf' \
            --exclude='README.md' \
            --exclude='data/plan.schema.md' \
            ./ _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
