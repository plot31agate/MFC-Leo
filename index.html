<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Leo · Motherwell Training</title>
  <meta name="description" content="Leo's Motherwell FC pre-season training tracker." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#6C1D45" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/crest.jpg" />

  <!-- iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Leo · MFC" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <img src="icons/crest.jpg" alt="Motherwell FC" class="crest" width="26" height="26" />
    <h1 class="app-header__title" id="header-title">Leo Lee</h1>
    <span class="app-header__meta" id="header-meta"></span>
  </header>

  <main id="app" class="app-main"><!-- views render here --></main>

  <nav class="tabbar" aria-label="Main navigation">
    <a href="#/today" class="tabbar__item" data-tab="today">
      <svg class="tabbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M16 4h2a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <rect x="8" y="2.5" width="8" height="4" rx="1.2"/>
        <path d="M8.5 13.5l2.2 2.2 4.3-4.6"/>
      </svg>
      <span class="tabbar__label">Today</span>
    </a>
    <a href="#/plan" class="tabbar__item" data-tab="plan">
      <svg class="tabbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/>
        <path d="M3 9.5h18"/><path d="M8 2.5v4"/><path d="M16 2.5v4"/>
      </svg>
      <span class="tabbar__label">Plan</span>
    </a>
    <a href="#/progress" class="tabbar__item" data-tab="progress">
      <svg class="tabbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 4v15a1 1 0 0 0 1 1h15"/>
        <path d="M7.5 14.5l3.5-3.5 3 3 4.5-5"/>
      </svg>
      <span class="tabbar__label">Progress</span>
    </a>
    <a href="#/reference" class="tabbar__item" data-tab="reference">
      <svg class="tabbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 6.5C10.4 5.4 7.8 5 4.5 5v13c3.3 0 5.9.4 7.5 1.5 1.6-1.1 4.2-1.5 7.5-1.5V5c-3.3 0-5.9.4-7.5 1.5z"/>
        <path d="M12 6.5v13"/>
      </svg>
      <span class="tabbar__label">Guide</span>
    </a>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
